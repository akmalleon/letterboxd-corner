<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leon — Letterboxd Corner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
  html, body {
    margin: 0;
    padding: 0;
    background-color: #14181c;
  }
  @keyframes marquee {
    0% { transform: translateX(0%); }
    100% { transform: translateX(-50%); }
  }
  .animate-marquee {
    display: flex;
    width: max-content;
    animation: marquee 35s linear infinite;
  }
  .animate-marquee:hover {
    animation-play-state: paused;
  }

  /* Hover GIF Effect */
  .hover-gif {
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
  }
  a:hover .hover-gif {
    opacity: 1;
  }
  a:hover .poster-img {
    opacity: 0;
  }

  /* Efek Nyala Api Berapi-api pada Tombol Letterboxd */
  @keyframes flameGlow {
    0%, 100% {
      box-shadow: 0 0 15px rgba(255, 128, 0, 0.6), 0 0 30px rgba(255, 69, 0, 0.4), inset 0 0 10px rgba(255, 255, 0, 0.5);
    }
    50% {
      box-shadow: 0 0 25px rgba(255, 69, 0, 0.8), 0 0 45px rgba(255, 140, 0, 0.6), inset 0 0 15px rgba(255, 255, 0, 0.8);
    }
  }

  @keyframes flameGrow {
    0%, 100% {
      transform: translateY(-2px) scale(1);
      box-shadow: 0 0 30px rgba(255, 69, 0, 0.9), 0 0 60px rgba(255, 140, 0, 0.7), 0 0 90px rgba(255, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 0, 0.9);
    }
    50% {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 0 40px rgba(255, 69, 0, 1), 0 0 75px rgba(255, 140, 0, 0.9), 0 0 110px rgba(255, 0, 0, 0.7), inset 0 0 25px rgba(255, 255, 0, 1);
    }
  }

  .fire-btn {
    animation: flameGlow 2.5s infinite ease-in-out;
    border: 1px solid rgba(255, 165, 0, 0.6);
  }

  .fire-btn:hover {
    animation: flameGrow 1s infinite ease-in-out;
  }

  /* Animasi menunjuk untuk tangan ikonik */
  @keyframes pointBounce {
    0%, 100% { transform: translateX(0) scale(1); }
    50% { transform: translateX(-6px) scale(1.1); }
  }
  .animate-point {
    animation: pointBounce 1.2s infinite ease-in-out;
  }

  /* Animasi detak jantung untuk kata follow */
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.15); }
    30% { transform: scale(1); }
    45% { transform: scale(1.1); }
    60% { transform: scale(1); }
  }
  .heart-beat {
    display: inline-block;
    animation: heartbeat 1.5s infinite ease-in-out;
    color: #00e054;
    font-weight: 700;
    position: relative;
    cursor: pointer;
  }
  .heart-beat:hover {
    color: #ff8000;
    text-decoration: underline;
  }

  /* Animasi Emoji Hati Keluar Menyebar & Fade */
  @keyframes floatHeart1 {
    0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
    100% { transform: translate(-25px, -20px) scale(1.2); opacity: 0; }
  }
  @keyframes floatHeart2 {
    0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
    100% { transform: translate(25px, -25px) scale(1.1); opacity: 0; }
  }
  @keyframes floatHeart3 {
    0% { transform: translate(0, 0) scale(0.4); opacity: 1; }
    100% { transform: translate(0px, -35px) scale(1.3); opacity: 0; }
  }
  @keyframes floatHeart4 {
    0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
    100% { transform: translate(-30px, 10px) scale(1.0); opacity: 0; }
  }
  @keyframes floatHeart5 {
    0% { transform: translate(0, 0) scale(0.4); opacity: 1; }
    100% { transform: translate(30px, 10px) scale(1.2); opacity: 0; }
  }

  .floating-heart {
    position: absolute;
    top: 50%;
    left: 50%;
    font-size: 10px;
    pointer-events: none;
    user-select: none;
  }
  .fh-1 { animation: floatHeart1 1.4s infinite ease-out; }
  .fh-2 { animation: floatHeart2 1.2s infinite ease-out 0.3s; }
  .fh-3 { animation: floatHeart3 1.6s infinite ease-out 0.2s; }
  .fh-4 { animation: floatHeart4 1.3s infinite ease-out 0.5s; }
  .fh-5 { animation: floatHeart5 1.5s infinite ease-out 0.4s; }

  /* KODE UTAMA PEMICU AGAR BACKGROUND GIF TERUS BERGERAK TANPA DI-SCROLL */
  .bg-gif-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    background-color: #14181c;
    transform: translate3d(0, 0, 0);
    will-change: transform;
  }
  .bg-gif-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.05) translate3d(0, 0, 0);
    filter: blur(4px);
    opacity: 0.2;
    animation: preventFreeze 1s infinite linear;
  }
  @keyframes preventFreeze {
    0%, 100% { opacity: 0.2; }
  }

  /* Vinyl player mengikuti scroll */
  .vinyl-floating {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 9999;
    pointer-events: auto;
  }
  @media (min-width: 640px) {
    .vinyl-floating {
      top: 1.5rem;
      right: 1.5rem;
    }
  }

  /* --- ANIMASI ELEGANT WARM RED HEAVENLY GLOW --- */
  @keyframes heavenlyRedWave {
    0%, 100% {
      opacity: 0.45;
      filter: blur(16px);
      box-shadow: 0 0 25px rgba(235, 64, 52, 0.4), inset 0 0 15px rgba(255, 90, 80, 0.3);
      transform: scale(1);
    }
    50% {
      opacity: 0.8;
      filter: blur(24px);
      box-shadow: 0 0 50px rgba(245, 75, 60, 0.7), inset 0 0 30px rgba(255, 120, 100, 0.5);
      transform: scale(1.02);
    }
  }
  .warm-heavenly-glow {
    animation: heavenlyRedWave 4s ease-in-out infinite;
  }

  /* Styling khusus untuk efek Matrix Scramble */
  .matrix-char {
    color: #00e054; /* Warna hijau neon khas Matrix */
    font-weight: bold;
    opacity: 0.8;
  }
  </style>
</head>
